name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --allowedTools "Read,Glob,Grep,Bash(git diff:*),Bash(git log:*),Bash(git show:*)"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Please review this pull request and provide feedback on:
            - Code quality and best practices
            - Potential bugs or issues
            - Performance considerations
            - Security concerns
            - Test coverage
            - **Documentation**: Check if the PR adds or changes features, tools,
              configuration options, or architecture. If it does, verify that the
              corresponding docs in `docs/src/routes/` are updated. Flag missing
              docs updates — the docs site is the public reference and must stay
              in sync with the codebase. Key pages to check:
              - `getting-started/configuration/+page.md` for new config fields or env vars
              - `development/architecture/+page.md` for structural changes
              - `development/tools/+page.md` for new or changed tools
              - `guides/` for feature-level changes (channels, memory, scheduler, plugins)
            Be constructive and helpful in your feedback.
